<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SkillHub Options</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 620px; margin: 40px auto; padding: 0 20px; background: #0a0a0a; color: #eaeaea; }
    h1 { font-size: 18px; color: #ec4899; margin: 0 0 4px; }
    h2 { font-size: 12px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.15em; margin: 24px 0 8px; }
    p, label { font-size: 13px; color: #9ca3af; }
    input { width: 100%; padding: 8px; background: #141414; color: #eaeaea; border: 1px solid #262626; border-radius: 4px; margin: 8px 0 16px; box-sizing: border-box; }
    button { background: #ec489918; border: 1px solid #ec489944; color: #ec4899; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-weight: 700; font-size: 12px; margin-right: 6px; }
    button.secondary { background: #26262640; border-color: #404040; color: #d4d4d4; }
    .saved { color: #16a34a; margin-left: 10px; font-size: 12px; }
    .panel { background: #111; border: 1px solid #262626; border-radius: 6px; padding: 14px; font-family: ui-monospace, Menlo, monospace; font-size: 11.5px; }
    .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #1f1f1f; }
    .row:last-child { border-bottom: 0; }
    .k { color: #6b7280; }
    .v { color: #eaeaea; }
    .ok { color: #16a34a; }
    .bad { color: #ef4444; }
    .warn { color: #f59e0b; }
  </style>
</head>
<body>
  <h1>SkillHub Tracker — Options</h1>
  <p>Configure where the extension routes tasks and (optionally) syncs captures.</p>

  <label>Hub URL</label>
  <input id="hub" placeholder="https://your-hub.lovable.app" />

  <label>Sync Token (X-Extension-Token)</label>
  <input id="token" type="password" placeholder="Paste EXTENSION_SYNC_TOKEN value" />

  <button id="save">Save</button>
  <span id="msg" class="saved"></span>

  <h2>Service Worker Status</h2>
  <div id="status" class="panel">Loading…</div>
  <div style="margin-top: 10px;">
    <button id="refresh" class="secondary">Refresh</button>
    <button id="resched" class="secondary">Reschedule alarm</button>
    <button id="syncNow">Sync now</button>
  </div>

  <script>
    const hub = document.getElementById('hub');
    const msg = document.getElementById('msg');
    const statusEl = document.getElementById('status');

    const token = document.getElementById('token');
    chrome.storage.local.get(['hub_url', 'sync_token']).then(({ hub_url, sync_token }) => {
      hub.value = hub_url || '';
      token.value = sync_token || '';
    });
    document.getElementById('save').onclick = async () => {
      await chrome.storage.local.set({
        hub_url: hub.value.trim(),
        sync_token: token.value.trim(),
      });
      msg.textContent = '✓ Saved';
      setTimeout(() => msg.textContent = '', 2000);
    };

    function fmtAge(iso) {
      if (!iso) return '—';
      const ms = Date.now() - new Date(iso).getTime();
      if (ms < 0) return 'in ' + Math.round(-ms / 1000) + 's';
      if (ms < 60_000) return Math.round(ms / 1000) + 's ago';
      if (ms < 3_600_000) return Math.round(ms / 60_000) + 'm ago';
      return Math.round(ms / 3_600_000) + 'h ago';
    }
    function row(k, v, cls) {
      const c = cls ? ` class="${cls}"` : '';
      return `<div class="row"><span class="k">${k}</span><span class="v"${c}>${v}</span></div>`;
    }

    async function refresh() {
      const r = await chrome.runtime.sendMessage({ type: 'GET_STATUS' }).catch(e => ({ error: String(e) }));
      if (!r || r.error) { statusEl.innerHTML = `<span class="bad">SW unreachable: ${r?.error || 'no response'}</span>`; return; }
      const s = r.status || {};
      const alarmCls = s.alarm_ok ? 'ok' : 'bad';
      const errCls = r.last_error ? 'bad' : 'ok';
      statusEl.innerHTML = [
        row('Service worker started', fmtAge(s.sw_started_at)),
        row('Alarm registered', s.alarm_ok ? '✓ yes' : '✗ no', alarmCls),
        row('Alarm period', (r.alarm?.periodInMinutes ?? s.alarm_period_min ?? '—') + ' min'),
        row('Next alarm fire', r.alarm ? fmtAge(r.alarm.next_fire_iso) : '—'),
        row('Last alarm fired', fmtAge(s.last_alarm_at)),
        row('Buffer size', r.buffer_size ?? 0),
        row('Sync enabled', r.sync_enabled ? '✓' : '✗'),
        row('Hub URL', r.hub_url || '—'),
        row('Last sync', fmtAge(r.last_sync_at) + (r.last_sync_count ? ` (${r.last_sync_count})` : '')),
        row('Backoff', r.backoff_ms ? (r.backoff_ms + 'ms') : '0', r.backoff_ms ? 'warn' : ''),
        row('Last error', r.last_error || '—', errCls),
      ].join('');
    }

    document.getElementById('refresh').onclick = refresh;
    document.getElementById('resched').onclick = async () => {
      await chrome.runtime.sendMessage({ type: 'RESCHEDULE_ALARM' });
      refresh();
    };
    document.getElementById('syncNow').onclick = async () => {
      await chrome.runtime.sendMessage({ type: 'SYNC_NOW' });
      refresh();
    };

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
