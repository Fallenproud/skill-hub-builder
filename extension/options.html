<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>SkillHub Options</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 540px; margin: 40px auto; padding: 0 20px; background: #0a0a0a; color: #eaeaea; }
    h1 { font-size: 18px; color: #ec4899; }
    p, label { font-size: 13px; color: #9ca3af; }
    input { width: 100%; padding: 8px; background: #141414; color: #eaeaea; border: 1px solid #262626; border-radius: 4px; margin: 8px 0 16px; }
    button { background: #ec489918; border: 1px solid #ec489944; color: #ec4899; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-weight: 700; }
    .saved { color: #16a34a; margin-left: 10px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>SkillHub Tracker — Options</h1>
  <p>Configure where the extension routes tasks and (optionally) syncs captures.</p>
  <label>Hub URL</label>
  <input id="hub" placeholder="https://your-hub.lovable.app" />
  <button id="save">Save</button>
  <span id="msg" class="saved"></span>
  <script>
    const hub = document.getElementById('hub');
    const msg = document.getElementById('msg');
    chrome.storage.local.get(['hub_url']).then(({ hub_url }) => { hub.value = hub_url || ''; });
    document.getElementById('save').onclick = async () => {
      await chrome.storage.local.set({ hub_url: hub.value.trim() });
      msg.textContent = '✓ Saved';
      setTimeout(() => msg.textContent = '', 2000);
    };
  </script>
</body>
</html>
